<!DOCTYPE html>
<html>
<head>
    <title>API Testing</title>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .endpoint { border: 1px solid #ddd; margin: 20px 0; padding: 15px; border-radius: 5px; }
        .endpoint h3 { margin-top: 0; color: #333; }
        textarea { width: 100%; height: 100px; }
        button { background: #007cba; color: white; padding: 10px 20px; border: none; border-radius: 3px; cursor: pointer; }
        button:hover { background: #005a8b; }
        .result { background: #f5f5f5; padding: 10px; margin-top: 10px; border-radius: 3px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>Laravel URL Shortener API Test</h1>
    
    <div class="endpoint">
        <h3>1. Register User</h3>
        <button onclick="testRegister()">Test Registration</button>
        <div id="register-result" class="result" style="display: none;"></div>
    </div>

    <div class="endpoint">
        <h3>2. Login User</h3>
        <button onclick="testLogin()">Test Login</button>
        <div id="login-result" class="result" style="display: none;"></div>
    </div>

    <div class="endpoint">
        <h3>3. Create Link (requires token)</h3>
        <textarea id="token-input" placeholder="Paste your Bearer token here..."></textarea><br><br>
        <button onclick="testCreateLink()">Create Link</button>
        <div id="create-link-result" class="result" style="display: none;"></div>
    </div>

    <div class="endpoint">
        <h3>4. Test Redirect</h3>
        <input type="text" id="slug-input" placeholder="Enter slug" value="test-slug">
        <button onclick="testRedirect()">Test Redirect</button>
        <div id="redirect-result" class="result" style="display: none;"></div>
    </div>

    <script>
        const API_BASE = 'http://127.0.0.1:8000/api';
        
        async function makeRequest(url, options = {}) {
            try {
                const response = await fetch(url, {
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json',
                        ...options.headers
                    },
                    ...options
                });
                
                const data = await response.text();
                let jsonData;
                try {
                    jsonData = JSON.parse(data);
                } catch {
                    jsonData = { raw_response: data };
                }
                
                return {
                    status: response.status,
                    data: jsonData
                };
            } catch (error) {
                return {
                    status: 'ERROR',
                    data: { error: error.message }
                };
            }
        }
        
        async function testRegister() {
            const result = await makeRequest(`${API_BASE}/register`, {
                method: 'POST',
                body: JSON.stringify({
                    name: 'Test User',
                    email: 'test@example.com',
                    password: 'password',
                    password_confirmation: 'password'
                })
            });
            
            document.getElementById('register-result').style.display = 'block';
            document.getElementById('register-result').textContent = JSON.stringify(result, null, 2);
        }
        
        async function testLogin() {
            const result = await makeRequest(`${API_BASE}/login`, {
                method: 'POST',
                body: JSON.stringify({
                    email: 'test@example.com',
                    password: 'password'
                })
            });
            
            document.getElementById('login-result').style.display = 'block';
            document.getElementById('login-result').textContent = JSON.stringify(result, null, 2);
        }
        
        async function testCreateLink() {
            const token = document.getElementById('token-input').value.trim();
            if (!token) {
                alert('Please enter a Bearer token first');
                return;
            }
            
            const result = await makeRequest(`${API_BASE}/links`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    slug: 'test-slug',
                    target_url: 'https://laravel.com',
                    is_active: true
                })
            });
            
            document.getElementById('create-link-result').style.display = 'block';
            document.getElementById('create-link-result').textContent = JSON.stringify(result, null, 2);
        }
        
        async function testRedirect() {
            const slug = document.getElementById('slug-input').value.trim();
            if (!slug) {
                alert('Please enter a slug');
                return;
            }
            
            const result = await makeRequest(`${API_BASE}/r/${slug}`, {
                method: 'POST',
                body: JSON.stringify({
                    referrer: 'https://test.com',
                    idempotency_key: 'test-' + Date.now()
                })
            });
            
            document.getElementById('redirect-result').style.display = 'block';
            document.getElementById('redirect-result').textContent = JSON.stringify(result, null, 2);
        }
    </script>
</body>
</html>
